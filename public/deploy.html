<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deploy</title>
  <style>
    /* 背景设成 Notion 深色画布的颜色，嵌进去看起来浑然一体；想要纯黑改成 #000 即可 */
    html, body { margin: 0; padding: 0; height: 100%; background: #191919; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex;
      align-items: flex-start;   /* 顶部 */
      justify-content: flex-start; /* 左侧 */
      padding: 14px;
      box-sizing: border-box;
    }
    .wrap { display: flex; flex-direction: column; gap: 14px; }
    .item { display: flex; flex-direction: column; gap: 6px; }
    .btn {
      appearance: none; border: none; cursor: pointer;
      background: #22c55e; color: #06140b;       /* 黑底上的亮绿按钮 */
      font-size: 15px; font-weight: 700;
      padding: 10px 20px; border-radius: 10px;
      transition: background .15s, transform .05s;
      box-shadow: 0 2px 10px rgba(34, 197, 94, .25);
    }
    .btn:hover { background: #34d77f; }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { background: #3a3a3a; color: #9aa0a6; cursor: default; box-shadow: none; }
    .status { font-size: 12px; color: #9aa0a6; min-height: 14px; padding-left: 2px; }
    .status.ok { color: #22c55e; }
    .status.err { color: #f87171; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="item">
      <button class="btn" data-hook="https://api.vercel.com/v1/integrations/deploy/prj_f77wY9XFYXY4FMtiGzugkdM1eoDJ/cqmgCT2sf7">🚀 部署notion-fuwari</button>
      <div class="status"></div>
    </div>
    <div class="item">
      <button class="btn" data-hook="https://api.vercel.com/v1/integrations/deploy/prj_YhONKJnDAJIs26BXphUNFoMguHRn/HMhs1watPC">🚀 部署astro-whono</button>
      <div class="status"></div>
    </div>
  </div>
  <script>
    // Vercel Deploy Hook：往它发个 POST 就触发一次部署。每个按钮用自己的 data-hook。
    document.querySelectorAll(".btn").forEach((btn) => {
      const status = btn.parentElement.querySelector(".status");
      const hook = btn.dataset.hook;
      const label = btn.textContent;

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        btn.textContent = "部署中…";
        status.className = "status";
        status.textContent = "";
        try {
          // mode:'no-cors' = 只管把请求发出去、不读返回、不跳转（Vercel 照样收到并部署）
          await fetch(hook, { method: "POST", mode: "no-cors" });
          const t = new Date().toLocaleTimeString("zh-CN", { hour12: false });
          status.className = "status ok";
          status.textContent = "✅ 已触发部署 · " + t;
          btn.textContent = "✅ 已触发";
        } catch (e) {
          status.className = "status err";
          status.textContent = "❌ 触发失败，请重试";
          btn.textContent = "🚀 重新部署";
        }
        // 4 秒后恢复按钮，防手抖连点
        setTimeout(() => { btn.disabled = false; btn.textContent = label; }, 4000);
      });
    });
  </script>
</body>
</html>
